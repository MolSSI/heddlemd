schema_version = 1
init = "argon.in.xyz"

[simulation]
seed = 1
temperature = 100.0 # K (sampled if init lacks velocities; ignored otherwise)

# Single-phase NVE run. The bundle keeps its original 100-step trajectory
# so its outputs remain byte-identical reference data for the
# reproducibility tests.
[[phase]]
name = "run"
n_steps = 100
dt = 1.0e-15        # 1 fs

[phase.integrator]
kind = "velocity-verlet"
lossless = false

[phase.output]
trajectory_every = 10
include_velocities = true
log_every = 5

[[particle_types]]
name = "Ar"
mass = 6.6335e-26   # kg (argon)

[[pair_interactions]]
between = ["Ar", "Ar"]
potential = "lennard-jones"
sigma = 3.40e-10    # m
epsilon = 1.65e-21  # J  (~120 K * k_B)
cutoff = 8.5e-10    # m  (2.5 sigma)
r_switch = 8.5e-10  # m  (== cutoff: hard-cutoff degenerate case; preserves
                     #     bit-exact reference trajectory)
